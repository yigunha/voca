<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>한국어 학습 게임</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="game-box">
            <div class="loading" id="loadingScreen">
                <div class="loading-spinner"></div>
                <p>게임을 불러오는 중...</p>
            </div>

            <div id="gameContent" class="hidden">
                <div class="main-menu" id="mainMenu">
                    <h2 id="mainMenuTitle">학습 모드 선택</h2>
                    <div class="main-menu-buttons">
                        <button class="main-menu-btn" onclick="selectMainMenu('문법')">문법</button>
                        <button class="main-menu-btn" onclick="selectMainMenu('단어')">단어</button>
                        <button class="main-menu-btn" onclick="selectMainMenu('받아쓰기')">받아쓰기</button>
                        <button class="main-menu-btn" onclick="selectMainMenu('듣기')">듣기</button>
                    </div>
                </div>

                <div class="level-selector hidden" id="levelSelector">
                    <div class="level-title" id="levelTitle"></div>
                    <button class="back-btn" onclick="backToMainMenu()">← 메인 메뉴</button>
                    <div class="level-buttons" id="levelButtons"></div>
                </div>

                <div id="gameArea" class="hidden game-area">
                    <div class="content-section" id="contentSection">
                        <div class="sentence" id="sentence"></div>
                        <div id="optDescription" class="opt-description" style="display: none;"></div>
                        <div class="options-grid" id="optionsGrid"></div>
                        <div id="conditionText" class="condition-text" style="display: none;"></div>
                    </div>
                    
                    <div class="audio-player hidden" id="audioPlayer">
                        <audio id="audioElement" src=""></audio>
                        <div class="audio-controls">
                            <button class="audio-btn" onclick="playAudio()">▶ 재생</button>
                            <button class="audio-btn" onclick="stopAudio()">⏹ 정지</button>
                            <button class="audio-btn loop-btn" id="audioLoopBtn" onclick="toggleAudioLoop()">🔁 반복 OFF</button>
                            <select id="speedSelect" class="audio-btn" onchange="updateAudioSpeed()" style="background-color: #4b5563; color: white; border: none; font-size: 0.9em; font-weight: bold; cursor: pointer; outline: none; padding: 0 5px; border-radius: 6px;">
                                <option value="1.0">1.0x</option>
                                <option value="0.9">0.9x</option>
                                <option value="0.8" selected>0.8x</option>
                                <option value="0.7">0.7x</option>
                                <option value="0.6">0.6x</option>
                                <option value="0.5">0.5x</option>
                            </select>
                        </div>
                        
                        <div class="audio-options" style="display: flex; flex-direction: row; gap: 15px; align-items: center; margin-top: 15px;">
                            <div class="time-control" style="flex: 1; display: flex; flex-direction: row; align-items: center; gap: 5px;">
                                <label for="audioStartTime" style="min-width: 40px; color: #9ca3af; font-size: 0.85em; font-weight: bold; margin: 0;">A: <span id="startTimeDisplay">0.0</span></label>
                                <input type="range" id="audioStartTime" min="0" max="10" step="0.1" value="0" oninput="updateStartTime()" style="flex: 1; height: 6px; background: #1f2937; border-radius: 3px; outline: none; cursor: pointer;">
                            </div>
                            <div class="time-control" style="flex: 1; display: flex; flex-direction: row; align-items: center; gap: 5px;">
                                <label for="audioEndTime" style="min-width: 40px; color: #9ca3af; font-size: 0.85em; font-weight: bold; margin: 0;">B: <span id="endTimeDisplay">0.0</span></label>
                                <input type="range" id="audioEndTime" min="0" max="10" step="0.1" value="10" oninput="updateEndTime()" style="flex: 1; height: 6px; background: #1f2937; border-radius: 3px; outline: none; cursor: pointer;">
                            </div>
                        </div>
                    </div>
                    
                    <div class="answer-section" id="answerSection">
                        <div class="answer-controls">
                            <div class="media-buttons">
                                <button class="control-btn picture-btn hidden" id="pictureBtn" onclick="togglePicture()">보기</button>
                                <button class="control-btn passage-btn hidden" id="passageBtn" onclick="togglePassage()">지문</button>
                                <button class="control-btn audio-toggle-btn hidden" id="audioToggleBtn" onclick="toggleAudioPlayer()">듣기</button>
                            </div>
                            <div class="level-display">
                                문제 
                                <select id="problemSelect" onchange="jumpToProblem()" style="background: #1f2937; color: #60a5fa; border: 1px solid #4b5563; border-radius: 4px; padding: 2px 5px; font-weight: bold; font-size: 14px; cursor: pointer; outline: none; margin: 0 5px;"></select> 
                                / <span id="totalNum">12</span>
                            </div>
                            <div class="control-buttons">
                                <button class="control-btn hint-btn" onclick="toggleHint()">힌트</button>
                                <button class="control-btn answer-btn" onclick="toggleCorrectAnswer()">정답</button>
                            </div>
                        </div>
                        
                        <div class="number-grid hidden" id="numberGrid"></div>
                        
                        <div id="answerInputSection">
                            <input type="text" class="answer-input" id="answerInput" placeholder="정답을 입력하세요...">
                        </div>
                        
                        <div class="hint-display" id="hintDisplay"></div>
                        <div class="correct-answer-display" id="correctAnswerDisplay"></div>
                        <div class="comparison-display" id="comparisonDisplay"></div>
                    </div>

                    <div class="jimuns-container hidden" id="jimunsContainer"></div>

                    <div class="buttons" id="buttons">
                        <button class="btn btn-start" onclick="startGame()">▶ 게임 시작</button>
                    </div>
                </div>
            </div>

            <div class="picture-overlay hidden" id="pictureOverlay" onclick="hidePicture()">
                <img id="pictureImage" src="" alt="문제 그림">
            </div>

            <div class="passage-overlay hidden" id="passageOverlay" onclick="hidePassage()">
                <div class="passage-content-wrapper" onclick="event.stopPropagation()">
                    <div class="passage-content" id="passageContent"></div>
                    <button class="passage-close-btn" onclick="hidePassage()">닫기</button>
                </div>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
