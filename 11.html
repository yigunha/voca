<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>유튜브 플레이어 - 검색어를 입력하세요 WWW</title>
    <style>
        /* 기본 스타일 초기화 */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }

        /* 반응형 비디오 컨테이너 (16:9 비율 유지) */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px; /* 최대 너비 제한 */
            padding-bottom: 56.25%; /* 16:9 비율 계산 (9 / 16 * 100) */
            height: 0;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .info-text {
            margin-top: 15px;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    
    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube.com/embed/8B7ftQH9Jqw?rel=0&enablejsapi=1" 
            title="Search WWW Ep.03"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
