<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <title>YouTube Player - Search WWW</title>
    
    <style>
        /* 화면 중앙 정렬 및 배경색 설정 */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 반응형 비디오 컨테이너: 16:9 비율 유지 */
        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            padding-bottom: 56.25%; /* 16:9 비율 (9 / 16 * 100) */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .description {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ccc;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>한국어 교육 프로그램용 플레이어</h2>

    <div class="video-wrapper">
        <iframe 
            src="https://www.youtube.com/embed/8B7ftQH9Jqw?rel=0&enablejsapi=1&start=90&cc_load_policy=1&cc_lang_pref=id&hl=id" 
            title="Search WWW Ep.03"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="description">
        <p>※ 현재 1분 30초 지점부터 재생되도록 설정되어 있습니다.</p>
        <p>※ 자막은 해당 영상이 제공하는 언어(인도네시아어 등)로 우선 출력됩니다.</p>
    </div>

</body>
</html>
